<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Tunexa Music Player is a modern, responsive music player built with HTML, CSS, and JavaScript. Features include playlist management, play/pause, next/previous controls, progress bar, and volume control."
    />
    <meta
      name="keywords"
      content="Tunexa, Music Player, HTML, CSS, JavaScript, Audio Player, Playlist, Frontend Project, GitHub Pages"
    />
    <meta name="author" content="Muhammad Shaheer Haider" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>Tunexa Music Player</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/d8ea51ab6e.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <div class="app-shell">
      <section class="player-card">
        <div class="visual-panel">
          <div class="orb orb-one"></div>
          <div class="orb orb-two"></div>
          <div class="now-playing-pill">Now Playing</div>
          <img id="cover" src="" alt="Album cover" />

          <div class="song-info">
            <h3 id="title"></h3>
            <p id="artist"></p>
          </div>
        </div>

        <div class="controls-panel">
          <div class="time-row">
            <span id="current-time">0:00</span>
            <input type="range" id="progress" value="0" />
            <span id="duration">0:00</span>
          </div>

          <div class="controls">
            <button id="prev" aria-label="Previous song">
              <i class="fa-solid fa-backward"></i>
            </button>

            <button id="play" aria-label="Play or pause">
              <i class="fa-solid fa-play"></i>
            </button>

            <button id="next" aria-label="Next song">
              <i class="fa-solid fa-forward"></i>
            </button>
          </div>

          <div class="volume-box">
            <i class="fa-solid fa-volume-high"></i>
            <input
              type="range"
              id="volume"
              min="0"
              max="1"
              step="0.1"
              value="1"
            />
          </div>
        </div>
      </section>

      <aside class="playlist-panel">
        <div class="playlist-header">
          <div>
            <p class="eyebrow">Collection</p>
            <h2>Playlist</h2>
          </div>
          <span class="playlist-count">4 tracks</span>
        </div>

        <ul id="playlist"></ul>
      </aside>
    </div>

    <audio id="audio"></audio>

    <script src="script.js"></script>
  </body>
</html>
